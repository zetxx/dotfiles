Section "Monitor"
    Identifier     "monitor-hisense"
    VendorName     "Hisense"
    ModelName      "43A7300F"
    Option         "Primary"             	  "True"
    #Modeline 	   "3840x2160_60_1"  594.00  3840 4016 4104 4400  2160 2168 2178 2250 +hsync +vsync
    #Modeline 	   "3840x2160_59_1"  593.41  3840 4016 4104 4400  2160 2168 2178 2250 +hsync +vsync
    #Modeline 	   "3840x2160_60_2"  533.00  3840 3888 3920 4000  2160 2163 2168 2222 +hsync -vsync
    Option         "PreferredMode"       	  "3840x2160"
EndSection

Section "Monitor"
    Identifier     "monitor-avr-denon-1311"
    VendorName     "denon"
    ModelName      "1311"
    Option 	   "RightOf" 		 	  "DP-2"
    Option         "PreferredMode"       	  "640x480"
EndSection

Section "Monitor"
    Identifier "monitor-unused"
EndSection

Section "Screen"
    Identifier     "screen-hisense"
    Device         "gpu0"
    Monitor        "monitor-hisense"
EndSection

Section "Screen"
    Identifier     "screen-avr-denon-1311"
    Device         "gpu0"
    Monitor        "monitor-avr-denon-1311"
EndSection

Section "OutputClass"
     Identifier    "AMD"
     MatchDriver   "amdgpu"
     Driver        "amdgpu"
     Option 	   "EnablePageFlip" 		  "off"
     Option 	   "TearFree" 			  "False"
EndSection

Section "Device"
    Identifier     "gpu0"
    BusID          "PCI:9:0:0"
    Screen         0
    Option         "DRI"                          "3"
    Option         "VariableRefresh"              "False"
    Option         "Monitor-DP-2"                 "monitor-hisense"
    Option         "Monitor-HDMI-1"               "monitor-avr-denon-1311"
EndSection

Section "ServerLayout"
    Identifier     "Main"
    Option         "DefaultServerLayout"
    Screen         0                     	  "screen-hisense"
    Screen 	   1			 	  "screen-avr-denon-1311"
    Option         "BlankTime"           	  "30"
    Option         "StandbyTime"         	  "200"
    Option         "SuspendTime"         	  "2000"
    Option         "OffTime"             	  "3000"
EndSection

Section "ServerFlags"
    Option "NoPM" "true"
EndSection
