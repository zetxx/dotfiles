Section "Monitor"
    # this monitor is responsible only for video, audio goes trough denon avr
    Identifier     "monitor-hisense"
    VendorName     "Hisense"
    ModelName      "43A7300F"
    Option         "Primary"             	  "True"
    Option 	   "PreferredMode"	          "3840x2160"
EndSection

Section "Monitor"
    # this monitor is responsible only for audio, corresponding config for wireplumber is in place
    Identifier     "monitor-avr-denon-1311"
    VendorName     "denon"
    ModelName      "1311"
    Option 	   "RightOf" 		 	  "HDMI-1"
#    #Option         "PreferredMode"       	  "640x480"
EndSection

Section "Screen"
    Identifier     "screen-hisense"
    Device         "gpu0"
    Monitor        "monitor-hisense"
EndSection

Section "Screen"
    Identifier     "screen-avr-denon-1311"
    Device         "gpu0"
    Monitor        "monitor-avr-denon-1311"
EndSection

Section "OutputClass"
     Identifier    "AMD"
     MatchDriver   "amdgpu"
     Driver        "amdgpu"
     #Option 	   "EnablePageFlip" 		  "off"
     Option 	   "TearFree" 			  "False"
EndSection

Section "Device"
    Identifier     "gpu0"
    BusID          "PCI:9:0:0"
    Screen         0
    Option         "DRI"                          "3"
    Option         "VariableRefresh"              "True"
    Option         "Monitor-HDMI-1"               "monitor-hisense"
    Option         "Monitor-DP-2"                 "monitor-avr-denon-1311"
EndSection

Section "ServerLayout"
    Identifier     "Main"
    Option         "DefaultServerLayout"
    Screen         0                     	  "screen-hisense"
    Screen 	   1			 	  "screen-avr-denon-1311"
    Option         "BlankTime"           	  "30"
    Option         "StandbyTime"         	  "200"
    Option         "SuspendTime"         	  "2000"
    Option         "OffTime"             	  "3000"
EndSection

Section "ServerFlags"
    Option "NoPM" "true"
EndSection
