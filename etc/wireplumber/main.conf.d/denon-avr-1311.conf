-- Force HDMI surround profile for your AMD card
-- File: ~/.config/wireplumber/main.lua.d/99-hdmi-profile.lua

-- Get the card object by its ALSA name
alsa_card_name = "alsa_card.pci-0000_09_00.1"
desired_profile = "output:hdmi-surround-extra3"

-- Function to set profile when the card appears
function set_hdmi_profile(card)
  if card["alsa.card"] == alsa_card_name then
    local current_profile = card.profile
    if current_profile ~= desired_profile then
      card:set_profile(desired_profile)
      print("WirePlumber: Set HDMI profile to " .. desired_profile)
    end
  end
end

-- Subscribe to card creation events
wp_object_connect("Core", "object-added", function(obj)
  if obj["media.class"] == "Audio/Device" then
    set_hdmi_profile(obj)
  end
end)

-- Apply immediately to existing cards
for _, obj in pairs(wp_object_list("Audio/Device")) do
  set_hdmi_profile(obj)
end
