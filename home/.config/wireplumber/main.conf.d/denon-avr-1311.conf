-- Prefer DENON AVR HDMI sink as default
local desired_node_name = "alsa_output.pci-0000_09_00.1.hdmi-surround"
-- alternatively match by AVR EDID name:
local desired_alsa_name = "DENON-AVAMP"

local function set_default_if_match(node)
  if node["media.class"] ~= "Audio/Sink" then return end

  local nn = node["node.name"]
  local an = node["alsa.name"]

  if nn == desired_node_name or an == desired_alsa_name then
    -- Make it the default sink in the session
    -- Works on WP 0.4/0.5: set as default via metadata
    local md = wp:get_object("metadata", "default")
    if md then
      md:set("default.audio.sink", "Spa:Id", tostring(node["object.id"]))
      print("WirePlumber: Set default sink to " .. (nn or "DENON"))
    end
  end
end

-- existing nodes
for _, n in pairs(wp_object_list("Audio/Sink")) do
  set_default_if_match(n)
end

-- new nodes
wp_object_connect("Core", "object-added", function(obj)
  set_default_if_match(obj)
end)
